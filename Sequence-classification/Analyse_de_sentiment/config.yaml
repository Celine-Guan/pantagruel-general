# General
seed: 42
device: "cuda"  # or "cpu"

# Paths
data_dir: "/home/sgu/datasets/CLS/raw/cls-acl10-unprocessed/fr"
log_dir: "logs/analyse_de_sentiment"
save_dir: "checkpoints/analyse_de_sentiment"

# Model
model_name: "camembert-base"  
max_seq_length: 512
num_classes: 2
dropout: 0.1

# Training
batch_size: 16
num_epochs: 30
learning_rates: [1e-5, 5e-5, 1e-6, 5e-6]
valid_ratio: 0.2
early_stopping_patience: 3

# Dataset
datasets: ["books", "dvd", "music"]
